# Model routing configuration for AI Staff HQ
# Maps specialist roles and departments to optimal models via OpenRouter.
# Lookup order: package-local config/model_routing.yaml (preferred), then CWD/config/model_routing.yaml, otherwise defaults.

# Role-based routing (takes precedence over department/default when configured)
role_routing: {}

# Department-based fallback routing
department_routing: {}

# Budget mode (use cheaper models across the board)
# WARNING: When enabled, budget mode overrides role-based/department routing
# and forces all specialists onto the budget model unless you pass a runtime
# model override.
budget_mode:
  enabled: false
  model: ""

# Model metadata (for display and validation)
available_models:
  - id: "openrouter/hunter-alpha"
    name: "Hunter Alpha"
    context_window: 200000
    cost_per_1k_input: 0.0
    strengths: ["reasoning", "code", "analysis", "free"]

  - id: "openrouter/healer-alpha"
    name: "Healer Alpha"
    context_window: 200000
    cost_per_1k_input: 0.0
    strengths: ["reasoning", "code", "analysis", "free"]

  - id: "nvidia/nemotron-3-super-120b-a12b:free"
    name: "Nemotron 120b"
    context_window: 128000
    cost_per_1k_input: 0.005
    strengths: ["creativity", "multimodal", "code"]
