  brief: "R.I.P. Tequila is a parody liquor brand. The mascot is The Don - a skeleton\
    \ mob boss who returned from death with unfinished business. The tone is corporate-sinister.\
    \ Never winking at the camera. Threats and warmth are indistinguishable. Death\
    \ is mundane.\nThe brand has four existing guides: style, brand, voice, and universe.\
    \ Supporting characters include Huesos (distribution), La Contadora (CFO), El\
    \ Maestro (master distiller), and Los Gemelos (enforcement).\nYour job: generate\
    \ three new pieces of brand content.\n1. A product description for a new limited-edition\
    \ bottle.\n   It must sound like a premium spirits listing. It must also\n   sound\
    \ like a threat. Never explain the joke.\n\n2. A social media post from The Don's\
    \ personal account.\n   Formal. Grateful. Slightly ominous. Under 150 words.\n\
    \n3. A FAQ entry answering \"What happens if I don't finish my bottle?\"\n   Answer\
    \ in the brand voice. One paragraph. No direct threats.\n   The reader should\
    \ feel uncertain anyway."
