<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { fill: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 48px; font-weight: 700; }
      .subtitle { fill: #cbd5f5; font-size: 26px; font-family: 'Helvetica Neue', Arial, sans-serif; }
      .node { fill: #1f2937; stroke: #3b82f6; stroke-width: 2; rx: 14; ry: 14; }
      .node-text { fill: #e2e8f0; font-size: 28px; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; }
      .caption { fill: #94a3b8; font-size: 22px; font-family: 'Helvetica Neue', Arial, sans-serif; }
      .connector { stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <text x="540" y="120" text-anchor="middle" class="title">AI-Staff-HQ :: Cognitive Infrastructure</text>
  <text x="540" y="170" text-anchor="middle" class="subtitle">Treat AI like a workforce—not a prompt roulette</text>

  <!-- Nodes -->
  <rect x="460" y="220" width="160" height="70" class="node"/>
  <text x="540" y="265" text-anchor="middle" class="node-text">You</text>

  <rect x="460" y="330" width="160" height="90" class="node"/>
  <text x="540" y="385" text-anchor="middle" class="node-text">Chief of Staff</text>

  <rect x="160" y="470" width="220" height="90" class="node"/>
  <text x="270" y="525" text-anchor="middle" class="node-text">Strategy Dept</text>

  <rect x="430" y="470" width="220" height="90" class="node"/>
  <text x="540" y="525" text-anchor="middle" class="node-text">Creative Dept</text>

  <rect x="700" y="470" width="220" height="90" class="node"/>
  <text x="810" y="525" text-anchor="middle" class="node-text">Technical Dept</text>

  <rect x="150" y="620" width="240" height="70" class="node"/>
  <text x="270" y="664" text-anchor="middle" class="caption">Market Analyst</text>

  <rect x="430" y="620" width="240" height="70" class="node"/>
  <text x="550" y="664" text-anchor="middle" class="caption">Art Director</text>

  <rect x="710" y="620" width="240" height="70" class="node"/>
  <text x="830" y="664" text-anchor="middle" class="caption">Automation + Prompt</text>

  <rect x="410" y="760" width="260" height="70" class="node"/>
  <text x="540" y="804" text-anchor="middle" class="caption">Your Custom Specialists</text>

  <rect x="120" y="880" width="260" height="90" class="node"/>
  <text x="250" y="925" text-anchor="middle" class="caption">Templates structure thinking</text>

  <rect x="410" y="880" width="260" height="90" class="node"/>
  <text x="540" y="925" text-anchor="middle" class="caption">Workflows guide execution</text>

  <rect x="700" y="880" width="260" height="90" class="node"/>
  <text x="830" y="925" text-anchor="middle" class="caption">Knowledge base informs teams</text>

  <!-- Connectors -->
  <line x1="540" y1="290" x2="540" y2="330" class="connector"/>
  <line x1="540" y1="420" x2="270" y2="470" class="connector"/>
  <line x1="540" y1="420" x2="540" y2="470" class="connector"/>
  <line x1="540" y1="420" x2="810" y2="470" class="connector"/>
  <line x1="270" y1="560" x2="270" y2="620" class="connector"/>
  <line x1="540" y1="560" x2="550" y2="620" class="connector"/>
  <line x1="810" y1="560" x2="830" y2="620" class="connector"/>
  <line x1="540" y1="690" x2="540" y2="760" class="connector"/>
  <line x1="540" y1="830" x2="250" y2="880" class="connector"/>
  <line x1="540" y1="830" x2="540" y2="880" class="connector"/>
  <line x1="540" y1="830" x2="830" y2="880" class="connector"/>
</svg>
